# Render Blueprint — deploys the Decagent Console as a live web service.
# One-click: push this repo to GitHub, then open
#   https://render.com/deploy?repo=https://github.com/fumbasiyabongajason-ux/Decagents
# Render reads this file, builds the app, and gives you a permanent https URL.
# Full guide: docs/DEPLOY.md   ·   Spec: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: decagent-console
    runtime: python
    plan: free                      # free tier is fine for personal use (sleeps when idle)
    branch: main
    buildCommand: pip install -r runtime/requirements.txt
    startCommand: uvicorn runtime.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"             # modern Python (avoids old-syntax issues)
      # --- LLM provider: Groq (free + fast, OpenAI-compatible). API key is the secret below. ---
      - key: LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: LLM_MODEL
        value: moonshotai/kimi-k2-instruct   # PERMANENT (not in Aug-2026 deprecation). Its leaked <function=...> tool calls are now parsed & executed server-side, so tools work. Fast + agentic.
      - key: LLM_FALLBACK_MODEL
        value: llama-3.3-70b-versatile       # fallback on 429 (clean tool-calling; works until Aug 16)
      # --- Tools via Pipedream Connect MCP (managed auth, thousands of apps) ---
      # The app auto-mints + refreshes the Pipedream token from your client id/secret.
      - key: TOOLS_BACKEND
        value: mcp
      - key: PIPEDREAM_ENVIRONMENT
        value: development          # 'development' is free; 'production' (real users) needs a paid plan
      - key: PIPEDREAM_EXTERNAL_USER_ID
        value: me
      # --- You paste these in the Render dashboard (kept secret, never in git) ---
      - key: LLM_API_KEY
        sync: false                 # required — your FREE Groq key (console.groq.com)
      - key: DECAGENT_PASSWORD
        value: Love                 # login password (baked so it just works — no Render fiddling)
      - key: PIPEDREAM_CLIENT_ID
        sync: false                 # see docs/PIPEDREAM.md (leave all 3 blank = chat-only)
      - key: PIPEDREAM_CLIENT_SECRET
        sync: false
      - key: PIPEDREAM_PROJECT_ID
        sync: false                 # proj_xxxxx
      - key: MCP_APP_SLUGS
        value: github,gitlab,slack,notion,jira,trello,linear,stripe,gmail,google_drive,google_sheets,google_docs,google_calendar,airtable,twitter,linkedin,wordpress,instagram,facebook_pages,reddit,youtube,discord,telegram_bot_api   # github + dev/work platforms first (copilot), then the rest. Bad/unconnected slugs are skipped safely. ANY of Pipedream's ~2,700 apps works — add its slug, then connect at /connect.
      - key: MCP_MAX_TOOLS
        value: "64"                 # how many app tools to expose at once (raised for the broader platform set; the built-in-only fallback handles any provider that rejects a tool schema)
