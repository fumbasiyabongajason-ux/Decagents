# Render Blueprint — deploys the Decagent Console as a live web service.
# One-click: push this repo to GitHub, then open
#   https://render.com/deploy?repo=https://github.com/fumbasiyabongajason-ux/Decagents
# Render reads this file, builds the app, and gives you a permanent https URL.
# Full guide: docs/DEPLOY.md   ·   Spec: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: decagent-console
    runtime: python
    plan: free                      # free tier is fine for personal use (sleeps when idle)
    branch: main
    buildCommand: pip install -r runtime/requirements.txt
    startCommand: uvicorn runtime.server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"             # modern Python (avoids old-syntax issues)
      # --- FREE + fastest provider by default: Cerebras (swap to Groq/Gemini anytime) ---
      - key: LLM_BASE_URL
        value: https://api.cerebras.ai/v1
      - key: LLM_MODEL
        value: llama-3.3-70b
      # --- Tools via self-hosted n8n (free); connect later by adding N8N_WEBHOOK_URL ---
      - key: TOOLS_BACKEND
        value: n8n
      # --- You paste these in the Render dashboard (kept secret, never in git) ---
      - key: LLM_API_KEY
        sync: false                 # required — your FREE Cerebras key (cloud.cerebras.ai)
      - key: DECAGENT_PASSWORD
        sync: false                 # STRONGLY recommended — locks your public URL
      - key: N8N_WEBHOOK_URL
        sync: false                 # OPTIONAL now — add later to connect your n8n tools
