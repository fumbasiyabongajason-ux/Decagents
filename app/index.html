<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JasonAgents</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0d13; --sidebar:#09090d; --panel:#16161f; --panel2:#1c1c27;
    --line:#26262f; --line2:#33333f; --text:#ECECF1; --muted:#9a9aac;
    --accent:#6E56F8; --accent2:#36E0A6; --user:#20202b; --botbg:#101019;
    --grad:linear-gradient(120deg,#6E56F8,#36E0A6); --danger:#ff7a7a;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased}
  .app{display:flex;height:100vh}
  button{font-family:inherit;cursor:pointer}

  /* ---------- sidebar ---------- */
  .side{width:272px;background:var(--sidebar);border-right:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0}
  .side .top{padding:14px 14px 8px}
  .brand{display:flex;align-items:center;gap:9px;font-family:'Space Grotesk';font-weight:700;font-size:17px;padding:4px 6px 12px}
  .brand .dot{width:24px;height:24px;border-radius:7px;background:var(--grad);display:grid;place-items:center;font-size:13px;color:#08080c}
  .newbtn{width:100%;display:flex;align-items:center;gap:9px;padding:11px 13px;border:1px solid var(--line2);border-radius:11px;background:transparent;color:var(--text);font-size:14px;font-weight:500;transition:.15s}
  .newbtn:hover{background:var(--panel);border-color:var(--accent)}
  .threads{flex:1;overflow-y:auto;padding:8px 8px 14px}
  .grouplbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:600;font-family:'Space Grotesk';padding:14px 8px 6px}
  .thread{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;font-size:13.5px;color:#c9c9d6;cursor:pointer;transition:.12s;position:relative}
  .thread:hover{background:var(--panel)}
  .thread.active{background:var(--panel2)}
  .thread .tem{font-size:14px;flex-shrink:0}
  .thread .ttl{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .thread .del{opacity:0;border:none;background:none;color:var(--muted);font-size:14px;padding:2px 4px;border-radius:5px;flex-shrink:0}
  .thread:hover .del{opacity:1}
  .thread .del:hover{color:var(--danger);background:rgba(255,122,122,.12)}
  .side .foot{padding:11px 16px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
  .side .foot a{color:var(--accent2);text-decoration:none}

  /* ---------- main ---------- */
  .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .topbar{height:56px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;padding:0 18px;flex-shrink:0}
  .menu-btn{display:none;background:none;border:1px solid var(--line);color:var(--text);border-radius:8px;padding:5px 9px;font-size:15px}
  .agentsel{position:relative}
  .agentsel select{appearance:none;background:var(--panel);border:1px solid var(--line2);color:var(--text);font-family:'Space Grotesk';font-weight:600;font-size:14px;padding:8px 32px 8px 13px;border-radius:10px;cursor:pointer;outline:none}
  .agentsel select:hover{border-color:var(--accent)}
  .agentsel::after{content:"▾";position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:12px}
  .topbar .ttl{color:var(--muted);font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .thread-view{flex:1;overflow-y:auto}
  .msg{width:100%;border-bottom:1px solid rgba(255,255,255,.03)}
  .msg.bot{background:var(--botbg)}
  .msg-in{max-width:780px;margin:0 auto;padding:22px 24px;display:flex;gap:15px}
  .av{width:30px;height:30px;border-radius:8px;flex-shrink:0;display:grid;place-items:center;font-size:15px}
  .msg.user .av{background:var(--user)}
  .msg.bot .av{background:var(--grad);color:#08080c}
  .body{min-width:0;flex:1;padding-top:3px;line-height:1.65;font-size:15px;word-wrap:break-word;overflow-wrap:anywhere}
  .who{font-family:'Space Grotesk';font-weight:600;font-size:12.5px;color:var(--muted);margin-bottom:3px}
  .msg.user .who{color:var(--accent2)}
  .body p{margin:0 0 10px}.body p:last-child{margin-bottom:0}
  .body code{background:#000;border:1px solid var(--line);border-radius:5px;padding:1px 5px;font-size:13px;font-family:ui-monospace,Menlo,monospace}
  .body pre{background:#000;border:1px solid var(--line);border-radius:10px;padding:13px 15px;overflow-x:auto;margin:0 0 10px}
  .body pre code{background:none;border:none;padding:0}
  .body ul,.body ol{margin:0 0 10px;padding-left:22px}.body li{margin:3px 0}
  .body a{color:var(--accent2)} .body h1,.body h2,.body h3{font-family:'Space Grotesk';margin:6px 0 8px;line-height:1.25} .body h3{font-size:16px}
  .err{color:var(--danger);background:rgba(255,122,122,.08);border:1px solid rgba(255,122,122,.25);border-radius:10px;padding:11px 14px;font-size:14px}
  .err b{color:#ffb0b0}
  .filechip-msg{display:inline-flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line2);border-radius:7px;padding:3px 9px;font-size:12.5px;color:var(--muted);margin-top:6px;margin-right:6px}

  /* reasoning & steps trace */
  .steps{margin:0 0 12px;border:1px solid var(--line);border-radius:10px;background:#0c0c14;overflow:hidden}
  .steps summary{cursor:pointer;padding:9px 13px;font-family:'Space Grotesk';font-weight:600;font-size:12.5px;color:var(--accent2);list-style:none;user-select:none}
  .steps summary::-webkit-details-marker{display:none}
  .steps summary::before{content:"▸";color:var(--muted);margin-right:7px;display:inline-block}
  .steps[open] summary::before{content:"▾"}
  .step{padding:8px 13px;border-top:1px solid var(--line);font-size:13px;line-height:1.5}
  .step.reasoning{color:#cfcfdb;white-space:pre-wrap;max-height:280px;overflow:auto}
  .step.tool{color:#b6a7ff}
  .step.result{color:var(--muted)}
  .step .args{font-family:ui-monospace,Menlo,monospace;font-size:12px;background:#000;border:1px solid var(--line);border-radius:6px;padding:6px 8px;margin-top:5px;white-space:pre-wrap;word-break:break-word;max-height:220px;overflow:auto}

  /* empty state */
  .empty{max-width:720px;margin:0 auto;padding:8vh 24px 24px;text-align:center}
  .empty .big{font-size:30px;width:64px;height:64px;border-radius:17px;background:var(--grad);display:grid;place-items:center;margin:0 auto 20px;color:#08080c}
  .empty h2{font-family:'Space Grotesk';font-size:25px;font-weight:700;margin-bottom:8px}
  .empty p{color:var(--muted);margin-bottom:26px;font-size:15px}
  .chips{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
  .chip{border:1px solid var(--line);background:var(--panel);border-radius:11px;padding:11px 15px;font-size:13.5px;color:#d4d4e2;cursor:pointer;transition:.14s;text-align:left;max-width:330px}
  .chip:hover{border-color:var(--accent);transform:translateY(-2px)}

  .typing{display:flex;gap:5px;padding-top:9px}
  .typing span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bl 1.3s infinite}
  .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
  @keyframes bl{0%,60%,100%{opacity:.25}30%{opacity:1}}

  /* ---------- composer ---------- */
  .composer{border-top:1px solid var(--line);padding:14px 24px 18px;flex-shrink:0}
  .attachrow{max-width:780px;margin:0 auto 8px;display:flex;flex-wrap:wrap;gap:8px}
  .attachrow:empty{display:none}
  .achip{display:inline-flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--line2);border-radius:9px;padding:6px 10px;font-size:12.5px;color:#d0d0dc}
  .achip .x{cursor:pointer;color:var(--muted);font-weight:700}.achip .x:hover{color:var(--danger)}
  .cbox{max-width:780px;margin:0 auto;background:var(--panel);border:1px solid var(--line2);border-radius:16px;padding:7px 7px 7px 8px;display:flex;align-items:flex-end;gap:6px;transition:.15s}
  .cbox:focus-within{border-color:var(--accent)}
  .iconbtn{width:38px;height:38px;border-radius:10px;border:none;background:transparent;color:var(--muted);font-size:18px;display:grid;place-items:center;transition:.13s;flex-shrink:0}
  .iconbtn:hover{background:var(--panel2);color:var(--text)}
  .cbox textarea{flex:1;background:none;border:none;color:var(--text);font-family:inherit;font-size:15px;resize:none;outline:none;max-height:200px;line-height:1.5;padding:9px 2px}
  .send{width:38px;height:38px;border-radius:10px;border:none;background:var(--grad);color:#08080c;font-size:17px;flex-shrink:0;display:grid;place-items:center;transition:.15s}
  .send:disabled{opacity:.4;cursor:not-allowed}
  .hint{max-width:780px;margin:8px auto 0;text-align:center;font-size:11.5px;color:var(--muted)}

  /* gate */
  .gate{position:fixed;inset:0;background:rgba(8,8,12,.94);backdrop-filter:blur(10px);z-index:100;display:grid;place-items:center}
  .gatebox{background:var(--panel);border:1px solid var(--line2);border-radius:18px;padding:34px 30px;width:min(370px,90vw);text-align:center}
  .gico{width:50px;height:50px;border-radius:14px;background:var(--grad);display:grid;place-items:center;font-size:25px;color:#08080c;margin:0 auto 16px}
  .gatebox h2{font-family:'Space Grotesk';font-weight:700;margin-bottom:6px}
  .gatebox p{color:var(--muted);font-size:14px;margin-bottom:18px}
  .gatebox input{width:100%;background:var(--bg);border:1px solid var(--line2);border-radius:10px;padding:12px 14px;color:var(--text);font-family:inherit;font-size:15px;outline:none;margin-bottom:12px}
  .gatebox input:focus{border-color:var(--accent)}
  .gatebox button{width:100%;background:var(--grad);color:#08080c;border:none;border-radius:10px;padding:12px;font-family:'Space Grotesk';font-weight:600;font-size:15px}
  .gerr{color:var(--danger);font-size:13px;margin-top:10px;min-height:16px}

  .scrim{display:none}
  @media(max-width:820px){
    .side{position:fixed;left:0;top:0;bottom:0;z-index:40;transform:translateX(-100%);transition:.22s}
    .side.open{transform:none;box-shadow:0 0 60px rgba(0,0,0,.6)}
    .menu-btn{display:block}
    .scrim.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:30}
  }
</style>
</head>
<body>
<div class="gate" id="gate" style="display:none">
  <div class="gatebox">
    <div class="gico">◐</div>
    <h2>JasonAgents</h2>
    <p>Enter your password to access your console.</p>
    <input type="password" id="gatePw" placeholder="Password" onkeydown="if(event.key==='Enter')doAuth()">
    <button onclick="doAuth()">Unlock</button>
    <div class="gerr" id="gateErr"></div>
  </div>
</div>
<div class="app">
  <aside class="side" id="side">
    <div class="top">
      <div class="brand"><span class="dot">◐</span> JasonAgents</div>
      <button class="newbtn" onclick="newChat()">✚&nbsp; New chat</button>
      <button class="newbtn" onclick="openConnect()" style="margin-top:8px">🔌&nbsp; Connect apps</button>
    </div>
    <div class="threads" id="threadList"></div>
    <div class="foot">
      <span id="agentCount">10 agents</span>
      <a href="https://github.com/fumbasiyabongajason-ux/Decagents" target="_blank" rel="noopener noreferrer">repo ↗</a>
    </div>
  </aside>
  <div class="scrim" id="scrim" onclick="toggleSide()"></div>

  <main class="main">
    <div class="topbar">
      <button class="menu-btn" onclick="toggleSide()">☰</button>
      <div class="agentsel">
        <select id="agentSel" onchange="setAgent(this.value)"></select>
      </div>
      <div class="ttl" id="threadTitle"></div>
    </div>
    <div class="thread-view" id="view"></div>
    <div class="composer">
      <div class="attachrow" id="attachRow"></div>
      <div class="cbox">
        <button class="iconbtn" title="Attach a text/code file" onclick="document.getElementById('fileInput').click()">📎</button>
        <input type="file" id="fileInput" multiple style="display:none"
               accept=".txt,.md,.markdown,.csv,.tsv,.json,.js,.ts,.jsx,.tsx,.py,.rb,.go,.rs,.java,.c,.cpp,.cs,.php,.html,.css,.scss,.xml,.yaml,.yml,.log,.sh,.sql,text/*"
               onchange="onFiles(this.files)">
        <textarea id="input" rows="1" placeholder="Message your agents…  (Shift+Enter for new line)"
                  oninput="autogrow(this)" onkeydown="onKey(event)"></textarea>
        <button class="send" id="send" onclick="sendMsg()">➤</button>
      </div>
      <div class="hint">JasonAgents can use tools and make mistakes — review important actions. Files: text &amp; code only.</div>
    </div>
  </main>
</div>

<script>
const AGENTS = [
  {id:"auto",em:"✨",nm:"Auto",tg:"Picks the best agent for each message",ex:["Find 20 leads in fintech and draft an intro email","Research my top 3 competitors, then write a post about what sets me apart"]},
  {id:"builder",em:"🛠️",nm:"Builder",tg:"Describe an app → working code",ex:["Build a to-do app with a Postgres backend and a web UI","Write a Python script that emails me when a file lands in a folder"]},
  {id:"webwright",em:"🎨",nm:"Webwright",tg:"Edit, redesign & build websites",ex:["Redesign my homepage to feel more premium and add a pricing section","Build a landing page for my product with an email signup"]},
  {id:"octopilot",em:"🐙",nm:"Octopilot",tg:"Your GitHub co-pilot",ex:["Open a PR from my feature branch into main and summarize the changes","Review my open pull requests and flag risky ones"]},
  {id:"harvest",em:"🌾",nm:"Harvest",tg:"Turn any website into clean data",ex:["Scrape this directory into a spreadsheet of names, sites and emails","Pull all product names and prices from this store"]},
  {id:"prospector",em:"🔍",nm:"Prospector",tg:"Find your next 100 customers",ex:["Find 50 marketing directors at mid-size SaaS companies in the US","Build a list of independent coffee roasters in Europe with emails"]},
  {id:"outreach",em:"✉️",nm:"Outreach",tg:"Emails that get replies",ex:["Write a 3-email cold sequence for my web design service to restaurants","Draft a friendly follow-up to leads who haven't replied in a week"]},
  {id:"scribe",em:"✍️",nm:"Scribe",tg:"Content on demand",ex:["Write a 1,000-word blog post on why small brands should use email","Turn this blog post into a Twitter thread and a LinkedIn post"]},
  {id:"scout",em:"🧭",nm:"Scout",tg:"Deep research, summarized",ex:["Give me a competitive analysis of the top 5 project management tools","Research the market for eco-friendly packaging in 2026"]},
  {id:"broadcast",em:"📡",nm:"Broadcast",tg:"Run all your social channels",ex:["Plan a week of posts promoting my product across X and LinkedIn","Turn this announcement into a native post for each channel"]},
  {id:"concierge",em:"🛎️",nm:"Concierge",tg:"Inbox triage & support",ex:["Summarize the emails I got overnight and tell me what's urgent","Draft replies to anything in my inbox I can answer quickly"]},
];
const byId = Object.fromEntries(AGENTS.map(a=>[a.id,a]));
const FILE_CAP = 16000;
let threads = [], currentId = null, busy = false, attachments = [];
let PW = localStorage.getItem("japw") || "";   // access password

// ---------- persistence ----------
function load(){ try{ threads = JSON.parse(localStorage.getItem("dg_threads")||"[]"); }catch(e){ threads=[]; } }
function save(){ localStorage.setItem("dg_threads", JSON.stringify(threads.slice(0,200))); }
function cur(){ return threads.find(t=>t.id===currentId); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

function newChat(){
  const t = {id:uid(), title:"New chat", agent:"auto", messages:[], updated:Date.now()};
  threads.unshift(t); currentId=t.id; save(); renderAll();
  if(window.innerWidth<=820) closeSide();
  input.focus();
}
function switchThread(id){ currentId=id; renderAll(); if(window.innerWidth<=820) closeSide(); }
function deleteThread(id,ev){
  ev.stopPropagation();
  threads = threads.filter(t=>t.id!==id);
  if(currentId===id) currentId = threads[0] ? threads[0].id : null;
  save();
  if(!currentId) newChat(); else renderAll();
}
function setAgent(id){ const t=cur(); if(t){ t.agent=id; save(); } updateBar(); if(t&&t.messages.length===0) renderMessages(); }

// ---------- rendering ----------
function group(t){
  const d=(Date.now()-t.updated)/86400000;
  if(d<1) return "Today"; if(d<2) return "Yesterday"; if(d<7) return "Previous 7 days"; return "Older";
}
function renderThreadList(){
  const order=["Today","Yesterday","Previous 7 days","Older"]; const groups={};
  threads.forEach(t=>{(groups[group(t)]=groups[group(t)]||[]).push(t);});
  let html="";
  order.forEach(g=>{ if(!groups[g]) return;
    html+=`<div class="grouplbl">${g}</div>`;
    groups[g].forEach(t=>{
      const a=byId[t.agent]||byId.auto;
      html+=`<div class="thread ${t.id===currentId?'active':''}" onclick="switchThread('${t.id}')">
        <span class="tem">${a.em}</span><span class="ttl">${esc(t.title)}</span>
        <button class="del" title="Delete" onclick="deleteThread('${t.id}',event)">🗑</button></div>`;
    });
  });
  threadList.innerHTML = html;
}
function updateBar(){
  const t=cur(); const a=byId[(t&&t.agent)||"auto"];
  agentSel.value=a.id; threadTitle.textContent = t ? (t.messages.length?t.title:"") : "";
}
function renderMessages(){
  const t=cur();
  if(!t || t.messages.length===0){
    const a=byId[(t&&t.agent)||"auto"];
    view.innerHTML=`<div class="empty"><div class="big">${a.em}</div>
      <h2>${a.id==='auto'?'Your AI team, one chat':a.nm}</h2>
      <p>${a.id==='auto'?'Tell me what you need — I will route it to the right specialist. Pick a specific agent up top anytime.':a.tg+'.'}</p>
      <div class="chips">${a.ex.map(e=>`<div class="chip" onclick="useChip(this)">${esc(e)}</div>`).join("")}</div></div>`;
    return;
  }
  view.innerHTML = t.messages.map(m=>rowHtml(m)).join("");
  view.scrollTop=view.scrollHeight;
}
function rowHtml(m){
  const isUser=m.role==="user";
  const a=byId[m.agent]||byId[(cur()&&cur().agent)]||byId.auto;
  const who=isUser?"You":(m.who||a.nm);
  const av=isUser?"🧑":(m.em||a.em);
  const bodyHtml = m.error ? `<div class="err"><b>⚠️ ${esc(m.error.title)}</b><br>${esc(m.error.detail)}</div>`
                           : stepsHtml(m.steps)+md(m.display||m.content||"");
  return `<div class="msg ${isUser?'user':'bot'}"><div class="msg-in">
    <div class="av">${av}</div><div class="body"><div class="who">${who}</div>${bodyHtml}</div></div></div>`;
}
function renderAll(){ renderThreadList(); updateBar(); renderMessages(); }
function useChip(el){ input.value=el.textContent; autogrow(input); input.focus(); }

// ---------- markdown-lite ----------
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function md(t){
  t=esc(t);
  t=t.replace(/```([\s\S]*?)```/g,(m,c)=>`<pre><code>${c.replace(/^\n/,"")}</code></pre>`);
  t=t.replace(/`([^`]+)`/g,"<code>$1</code>");
  t=t.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
  t=t.replace(/\[([^\]]+)\]\((https?:[^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
  t=t.replace(/^### (.*)$/gm,"<h3>$1</h3>");
  t=t.replace(/^(?:- |\* )(.*)$/gm,"<li>$1</li>").replace(/^\d+\. (.*)$/gm,"<li>$1</li>");
  t=t.replace(/(<li>[\s\S]*?<\/li>)/g,m=>`<ul>${m}</ul>`).replace(/<\/ul>\s*<ul>/g,"");
  t=t.split(/\n{2,}/).map(b=>/^\s*<(ul|pre|h3)/.test(b)?b:`<p>${b.replace(/\n/g,"<br>")}</p>`).join("");
  return t;
}
function stepsHtml(steps){
  if(!steps || !steps.length) return "";
  const items=steps.map(s=>{
    if(s.type==="reasoning")  return `<div class="step reasoning">💭 ${esc(s.text)}</div>`;
    if(s.type==="tool_call")  return `<div class="step tool">🔧 <b>${esc(s.name)}</b><div class="args">${esc(s.args||"")}</div></div>`;
    if(s.type==="tool_result")return `<div class="step result">↳ ${esc(s.name||"result")}<div class="args">${esc(s.content||"")}</div></div>`;
    return "";
  }).join("");
  return `<details class="steps" open><summary>🧠 Reasoning &amp; steps (${steps.length})</summary>${items}</details>`;
}

// ---------- files ----------
function onFiles(files){
  [...files].forEach(f=>{
    const reader=new FileReader();
    reader.onload=()=>{
      let txt=reader.result||"";
      let note="";
      if(txt.length>FILE_CAP){ txt=txt.slice(0,FILE_CAP); note=" (truncated)"; }
      attachments.push({name:f.name, content:txt, note});
      renderAttach();
    };
    reader.onerror=()=>{ attachments.push({name:f.name, content:"", note:" (could not read)"}); renderAttach(); };
    reader.readAsText(f);
  });
  fileInput.value="";
}
function renderAttach(){
  attachRow.innerHTML=attachments.map((f,i)=>`<span class="achip">📄 ${esc(f.name)}${f.note}
    <span class="x" onclick="rmAttach(${i})">✕</span></span>`).join("");
}
function rmAttach(i){ attachments.splice(i,1); renderAttach(); }

// ---------- send ----------
async function sendMsg(){
  const typed=input.value.trim();
  if((!typed && attachments.length===0) || busy) return;
  if(!cur()) newChat();
  const t=cur();
  busy=true; send.disabled=true;

  // build API content (with file bodies) + display text (clean)
  let apiContent=typed;
  let displayExtra="";
  if(attachments.length){
    apiContent += "\n\n"+attachments.map(f=>`--- attached file: ${f.name} ---\n${f.content}`).join("\n\n");
    displayExtra = `<div>${attachments.map(f=>`<span class="filechip-msg">📄 ${esc(f.name)}</span>`).join("")}</div>`;
  }
  t.messages.push({role:"user", content:apiContent, display:(esc(typed)?md(typed):"")+displayExtra});
  if(t.title==="New chat" && (typed||attachments[0])) t.title=(typed||attachments[0].name).slice(0,48);
  t.updated=Date.now();
  attachments=[]; renderAttach();
  input.value=""; autogrow(input);
  save(); renderThreadList(); updateBar(); renderMessages();

  // typing indicator
  const a=byId[t.agent]||byId.auto;
  view.insertAdjacentHTML("beforeend",`<div class="msg bot" id="typing"><div class="msg-in">
    <div class="av">${a.em}</div><div class="body"><div class="typing"><span></span><span></span><span></span></div></div></div></div>`);
  view.scrollTop=view.scrollHeight;

  const apiHistory = t.messages.slice(0,-1).map(m=>({role:m.role, content:m.content}));
  try{
    const r=await fetch("/chat",{method:"POST",
      headers:{"Content-Type":"application/json","X-Decagent-Password":PW},
      body:JSON.stringify({agent:t.agent, message:apiContent, history:apiHistory.slice(-10)})});
    document.getElementById("typing")?.remove();
    if(r.status===401){ busy=false; send.disabled=false; showGate(); return; }
    if(!r.ok) throw new Error("HTTP "+r.status);
    const data=await r.json();
    if(data.error){
      t.messages.push({role:"assistant", error:{title:"The model returned an error", detail:data.error+"  —  check LLM_API_KEY / LLM_MODEL in Render → Environment."}});
    }else{
      const used=byId[data.agent]||a;
      const who = t.agent==="auto" ? `${used.nm} · auto-routed` : used.nm;
      t.messages.push({role:"assistant", content:data.response||"(empty response)", who, em:used.em, agent:used.id, steps:data.steps||[]});
    }
  }catch(err){
    document.getElementById("typing")?.remove();
    t.messages.push({role:"assistant", error:{title:"Couldn't reach the server", detail:"It may be waking up (free tier sleeps ~50s) — wait a moment and resend. ("+esc(err.message)+")"}});
  }
  t.updated=Date.now(); save(); renderMessages();
  busy=false; send.disabled=false; input.focus();
}

// ---------- input / sidebar ----------
function autogrow(el){ el.style.height="auto"; el.style.height=Math.min(el.scrollHeight,200)+"px"; }
function onKey(e){ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); sendMsg(); } }
function toggleSide(){ side.classList.toggle("open"); scrim.classList.toggle("show"); }
function closeSide(){ side.classList.remove("open"); scrim.classList.remove("show"); }

// ---------- password / login page ----------
function showGate(){ gate.style.display="grid"; setTimeout(()=>gatePw.focus(),60); }
function openConnect(){
  if(!PW){ showGate(); return; }   // must be logged in first
  window.open("/connect?pw=" + encodeURIComponent(PW), "_blank");
}
async function doAuth(){
  try{
    const r=await fetch("/auth",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:gatePw.value})});
    const d=await r.json();
    if(d.ok){ PW=gatePw.value; localStorage.setItem("japw",PW); gate.style.display="none"; gateErr.textContent=""; input.focus(); }
    else gateErr.textContent="Wrong password. Try again.";
  }catch(e){ gateErr.textContent="Can't reach the server (it may be waking up — retry)."; }
}
async function checkAuth(){
  try{
    const r=await fetch("/auth"); if(!r.ok) return;
    const {protected:prot}=await r.json();
    if(!prot) return;
    if(PW){ const v=await(await fetch("/auth",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:PW})})).json(); if(v.ok) return; }
    showGate();
  }catch(e){ /* offline/preview — no gate */ }
}

// ---------- init ----------
function initAgentSelect(){
  agentSel.innerHTML = AGENTS.map(a=>`<option value="${a.id}">${a.em}  ${a.nm}${a.id==='auto'?' — pick best':''}</option>`).join("");
}
load();
if(threads.length===0){ newChat(); } else { currentId=threads[0].id; }
initAgentSelect(); renderAll(); checkAuth(); input.focus();
</script>
</body>
